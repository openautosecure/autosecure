tunnel: autosecure
# Do 'cloudflared tunnel list' to get the ID needed
# Linux:   /home/<user>/.cloudflared/<your-tunnel-id>.json
# Windows: C:\Users\<user>\.cloudflared\<your-tunnel-id>.json
credentials-file: <path-from-above>
ingress:
  - hostname: <your-domain.com>
    service: http://localhost:3000
  - service: http_status:404
